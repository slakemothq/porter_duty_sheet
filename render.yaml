services:
  - type: web
    name: porter-duty-sheet
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: porter-db
      mountPath: /opt/render/project/src/db
      sizeGB: 1
